name: Backup diario a buckets (R2 + B2)

# Corre pg_dump contra Supabase y sube el resultado comprimido a los dos buckets de backup
# (Cloudflare R2 como principal, Backblaze B2 como espejo) — ver docs/PENDIENTES.md #4 y
# docs/SECURITY.md, sección de backup propio independiente del nativo de Supabase.
on:
  schedule:
    - cron: '0 6 * * *' # 03:00 America/Argentina/Buenos_Aires (UTC-3)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar cliente de Postgres 17 (pg_dump)
        # El servidor de Supabase corre Postgres 17.6 — pg_dump exige que su versión sea
        # >= la del servidor. El repo apt por defecto de Ubuntu solo trae la 16, así que se
        # agrega el repo oficial de PostgreSQL (apt.postgresql.org) para instalar la 17.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: backend
        run: npm install --omit=dev

      - name: Ejecutar backup
        working-directory: backend
        env:
          DB_HOST: ${{ secrets.BACKUP_DB_HOST }}
          DB_PORT: ${{ secrets.BACKUP_DB_PORT }}
          DB_NAME: ${{ secrets.BACKUP_DB_NAME }}
          DB_USER: ${{ secrets.BACKUP_DB_USER }}
          DB_PASSWORD: ${{ secrets.BACKUP_DB_PASSWORD }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: node scripts/backup_a_buckets.mjs
